<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLAIZ STUDIO | Premium Design & Branding</title>
  <meta name="description"
    content="PLAIZ STUDIO is a premium design studio crafting visually stunning web designs, logos, and immersive digital experiences that elevate brands." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="no" />
  <meta name="apple-mobile-web-app-capable" content="no" />
  <meta name="theme-color" content="#020617" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=Outfit:wght@100..900&display=swap">

  <!-- Nuclear Purge for Legacy Service Workers & Caches -->
  <script>
    (function () {
      // 1. Unregister all Service Workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Legacy Service Worker cleared');
          }
        });
      }

      // 2. Clear all Cache Storage
      if ('caches' in window) {
        caches.keys().then(function (names) {
          for (let name of names) caches.delete(name);
          console.log('Browser cache purged');
        });
      }

      // 3. Clear LocalStorage to remove old site sessions (once)
      const purgeKey = 'plaiz_studio_v2_purged';
      if (!localStorage.getItem(purgeKey)) {
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem(purgeKey, 'true');
        console.log('Local data reset for new version');
        window.location.reload(); // Force a fresh start
      }

      // 4. Force Fetch Kill-Scripts to bypass SW interception
      const swPaths = ['/sw.js', '/service-worker.js', '/workbox-sw.js'];
      swPaths.forEach(path => {
        fetch(path, { cache: 'reload', mode: 'no-cors' }).catch(() => { });
      });
    })();
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
